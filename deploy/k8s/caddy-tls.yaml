# HTTPS entrypoint for a custom domain, terminating TLS with automatic
# Let's Encrypt certs (Caddy). One domain, path-routed:
#   https://video.rn-web.xyz/           -> web (Next.js)         :3000
#   wss://video.rn-web.xyz/socket.io/   -> signaling/SFU server  :4000
# WebRTC media (UDP 40000-40100) still goes browser <-> node IP directly and is
# unaffected by this — it does not pass through Caddy.
#
# Prereqs: DNS A record video.rn-web.xyz -> node public IP, and SG open on 80+443.
#   kubectl apply -f deploy/k8s/caddy-tls.yaml
---
# ClusterIP so Caddy can reach the hostNetwork signaling pod by name.
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: video-call
spec:
  selector: { app: server }
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: video-call
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: video-call
data:
  Caddyfile: |
    video.rn-web.xyz {
      # Signaling (Socket.IO / WebSocket) and health -> combined server on :4000
      @signaling path /socket.io* /healthz
      handle @signaling {
        reverse_proxy server.video-call.svc.cluster.local:4000
      }
      # Everything else (page, /_next, /api/config, /room/*) -> web app
      handle {
        reverse_proxy web.video-call.svc.cluster.local:3000
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: video-call
spec:
  replicas: 1
  selector:
    matchLabels: { app: caddy }
  template:
    metadata:
      labels: { app: caddy }
    spec:
      # hostNetwork so it binds the node's :80/:443 (DNS points here). Cluster DNS
      # stays available so it can resolve the web/server Services.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: caddy
          image: caddy:2
          ports:
            - { containerPort: 80 }
            - { containerPort: 443 }
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { memory: "192Mi" }
          volumeMounts:
            - { name: config, mountPath: /etc/caddy }
            - { name: data, mountPath: /data }   # persists issued certs across restarts
      volumes:
        - name: config
          configMap: { name: caddy-config }
        - name: data
          persistentVolumeClaim: { claimName: caddy-data }
